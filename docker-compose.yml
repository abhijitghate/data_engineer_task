services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    command: alembic upgrade head
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=${MIGRATION_DATABASE_URL:-${DATABASE_URL}}
      - API_DB_USER=${API_DB_USER}
      - API_DB_PASSWORD=${API_DB_PASSWORD}
      - PIPELINE_DB_USER=${PIPELINE_DB_USER}
      - PIPELINE_DB_PASSWORD=${PIPELINE_DB_PASSWORD}
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    command: uvicorn src.application.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=${API_DATABASE_URL:-${DATABASE_URL}}
      - PYTHONPATH=/app
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  pipeline:
    build: .
    command: sh -c "python -m src.pipeline.pipeline ${PIPELINE_ARGS:-}"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=${PIPELINE_DATABASE_URL:-${DATABASE_URL}}
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      api:
        condition: service_healthy

  test:
    build: .
    command: pytest -q tests/integration_db
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=${TEST_DATABASE_URL:-${DATABASE_URL}}
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    profiles:
      - test

volumes:
  pgdata:
